<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>첫 로그인 - 담양군 중대재해예방통합관리시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #047857 0%, #10b981 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        body > main { width: 100%; max-width: 500px; }

        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18);
        }
        .auth-logo {
            display: flex; align-items: center; gap: 10px;
            justify-content: center;
            margin-bottom: 8px;
        }
        .auth-logo-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #047857, #10b981);
            color: white;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .auth-logo-text { display: flex; flex-direction: column; line-height: 1.2; }
        .auth-logo-text .gov { font-size: 11px; color: var(--text-gray); }
        .auth-logo-text .name { font-size: 16px; font-weight: 800; color: var(--main-dark2); }

        .auth-page-title {
            text-align: center;
            font-size: 20px; font-weight: 800;
            color: var(--main-dark2);
            margin-top: 22px;
            margin-bottom: 6px;
        }
        .auth-page-desc {
            text-align: center;
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 24px;
            line-height: 1.6;
        }

        /* 환영 박스 */
        .welcome-card {
            background: var(--brand-100);
            border: 1px solid var(--status-success-border);
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 22px;
            display: flex; align-items: center; gap: 12px;
        }
        .welcome-card .icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: white;
            color: var(--main-dark2);
            display: inline-flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .welcome-card .body { flex: 1; font-size: 13px; line-height: 1.6; }
        .welcome-card .body strong { color: var(--main-dark2); font-weight: 700; }
        .welcome-card .body .company { font-weight: 700; color: var(--text-black); display: block; margin-bottom: 2px; }

        .auth-form-label {
            display: block;
            font-size: 13px; color: var(--text-gray); font-weight: 600;
            margin-bottom: 6px;
            margin-top: 14px;
        }
        .auth-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--card-line);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-black);
            background: white;
            height: 44px;
        }
        .auth-input:disabled { background: var(--gray-100); color: var(--text-gray); }
        .auth-input:focus { outline: none; border-color: var(--main); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12); }

        .pwd-rules {
            margin-top: 8px;
            padding: 12px 14px;
            background: var(--gray-100);
            border-radius: 8px;
            font-size: 12px;
        }
        .pwd-rule {
            display: flex; align-items: center; gap: 6px;
            color: var(--text-gray);
            padding: 2px 0;
        }
        .pwd-rule.is-met { color: var(--status-success-fg); }

        /* 약관 동의 */
        .terms-section {
            margin-top: 18px;
            padding: 14px 16px;
            background: var(--gray-100);
            border-radius: 10px;
        }
        .terms-row {
            display: flex; align-items: center; gap: 8px;
            padding: 4px 0;
            font-size: 13px;
            color: var(--text-black);
        }
        .terms-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--main); }
        .terms-row a { color: var(--main-dark); font-weight: 700; text-decoration: none; margin-left: auto; font-size: 12px; }

        .auth-submit {
            width: 100%;
            margin-top: 24px;
            padding: 12px;
            background: linear-gradient(135deg, #047857, #10b981);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px; font-weight: 700;
            cursor: pointer;
        }
        .auth-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); }
        .auth-submit:disabled { background: var(--text-lightgray); cursor: not-allowed; }

        .token-info {
            margin-top: 14px;
            text-align: center;
            font-size: 11px;
            color: var(--text-gray);
        }
        .token-info code {
            font-family: 'SF Mono', Consolas, monospace;
            background: var(--gray-100);
            padding: 1px 6px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <main>
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                </div>
                <div class="auth-logo-text">
                    <span class="gov">담양군청</span>
                    <span class="name">중대재해통합관리시스템</span>
                </div>
            </div>

            <div class="auth-page-title">환영합니다 👋</div>
            <div class="auth-page-desc">첫 로그인 — 본인 정보 확인 후 비밀번호를 설정해 주세요.</div>

            <!-- 환영 박스 -->
            <div class="welcome-card">
                <div class="icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                </div>
                <div class="body">
                    <span class="company">A건설(주) · 김도급님</span>
                    <strong>청사 시설 보수공사</strong> (#2026-12) 도급계약 담당자로 초대되셨습니다. 권한: <strong>SUB (도급업체)</strong>
                </div>
            </div>

            <form onsubmit="event.preventDefault(); window.location.href='dashboard-ext.html';">
                <label class="auth-form-label">이메일 (변경 불가)</label>
                <input class="auth-input" type="email" value="kim@a.co.kr" disabled>

                <label class="auth-form-label" for="first-id">아이디 설정</label>
                <input class="auth-input" type="text" id="first-id" placeholder="4~50자 · 영문·숫자·언더스코어" value="kimdogup">

                <label class="auth-form-label" for="first-pw">비밀번호 설정</label>
                <input class="auth-input" type="password" id="first-pw" placeholder="비밀번호">
                <div class="pwd-rules">
                    <div class="pwd-rule" id="rule-len"><span class="check">○</span> 8자 이상</div>
                    <div class="pwd-rule" id="rule-alpha"><span class="check">○</span> 영문자 포함</div>
                    <div class="pwd-rule" id="rule-num"><span class="check">○</span> 숫자 포함</div>
                    <div class="pwd-rule" id="rule-spec"><span class="check">○</span> 특수문자 포함</div>
                </div>

                <label class="auth-form-label" for="first-pw-confirm">비밀번호 확인</label>
                <input class="auth-input" type="password" id="first-pw-confirm" placeholder="다시 입력">

                <!-- 약관 동의 -->
                <div class="terms-section">
                    <div class="terms-row">
                        <input type="checkbox" id="term-all">
                        <label for="term-all" style="font-weight: 700;">전체 동의</label>
                    </div>
                    <hr style="margin: 8px 0; border: 0; border-top: 1px solid var(--card-line);">
                    <div class="terms-row">
                        <input type="checkbox" required>
                        <span>(필수) 이용약관 동의</span>
                        <a href="#" onclick="event.preventDefault();">보기</a>
                    </div>
                    <div class="terms-row">
                        <input type="checkbox" required>
                        <span>(필수) 개인정보 처리방침 동의</span>
                        <a href="#" onclick="event.preventDefault();">보기</a>
                    </div>
                    <div class="terms-row">
                        <input type="checkbox">
                        <span>(선택) 마케팅 정보 수신 동의</span>
                    </div>
                </div>

                <button type="submit" class="auth-submit">
                    설정 완료 후 시스템 입장
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-left: 4px;"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
            </form>

            <div class="token-info">
                초대 토큰: <code>:token</code> · 만료 <strong style="color: var(--status-warning-fg);">D-3</strong> (2026-05-16 까지)
            </div>
        </div>
    </main>

    <script>
        (function () {
            'use strict';
            const pwInput = document.getElementById('first-pw');
            if (pwInput) {
                pwInput.addEventListener('input', () => {
                    const v = pwInput.value;
                    document.getElementById('rule-len').classList.toggle('is-met', v.length >= 8);
                    document.getElementById('rule-alpha').classList.toggle('is-met', /[a-zA-Z]/.test(v));
                    document.getElementById('rule-num').classList.toggle('is-met', /\d/.test(v));
                    document.getElementById('rule-spec').classList.toggle('is-met', /[!@#$%^&*(),.?":{}|<>]/.test(v));
                    document.querySelectorAll('.pwd-rule.is-met .check').forEach(c => c.textContent = '✓');
                    document.querySelectorAll('.pwd-rule:not(.is-met) .check').forEach(c => c.textContent = '○');
                });
            }

            // 전체 동의 토글
            const allChk = document.getElementById('term-all');
            if (allChk) {
                allChk.addEventListener('change', () => {
                    document.querySelectorAll('.terms-row input[type=checkbox]').forEach(c => {
                        if (c !== allChk) c.checked = allChk.checked;
                    });
                });
            }
        })();
    </script>
</body>
</html>
