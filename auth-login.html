<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 담양군 중대재해예방통합관리시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        /* ─── AUTH 공통 — 사이드바 없는 독립 페이지 ─── */
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #047857 0%, #10b981 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        body > main { width: 100%; max-width: 460px; }

        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18);
        }

        .auth-logo {
            display: flex; align-items: center; gap: 10px;
            justify-content: center;
            margin-bottom: 8px;
        }
        .auth-logo-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #047857, #10b981);
            color: white;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .auth-logo-text { display: flex; flex-direction: column; line-height: 1.2; }
        .auth-logo-text .gov { font-size: 11px; color: var(--text-gray); }
        .auth-logo-text .name { font-size: 16px; font-weight: 800; color: var(--main-dark2); }

        .auth-title {
            text-align: center;
            font-size: 14px;
            color: var(--text-gray);
            margin-bottom: 28px;
        }

        /* SSO 안내 박스 */
        .auth-sso-notice {
            display: flex; align-items: center; gap: 10px;
            padding: 14px 16px;
            background: var(--brand-100);
            border: 1px solid var(--status-success-border);
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px; color: var(--main-dark2);
        }
        .auth-sso-notice .icon { flex-shrink: 0; color: var(--main); }
        .auth-sso-notice .body { flex: 1; line-height: 1.5; }
        .auth-sso-notice .body strong { font-weight: 700; }
        .auth-sso-link {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 12px; color: var(--main-dark);
            font-weight: 700;
            text-decoration: none;
            margin-top: 4px;
        }
        .auth-sso-link:hover { text-decoration: underline; }

        .auth-divider {
            display: flex; align-items: center; gap: 12px;
            margin: 18px 0;
            font-size: 12px; color: var(--text-lightgray);
        }
        .auth-divider::before, .auth-divider::after {
            content: ""; flex: 1; height: 1px; background: var(--card-line);
        }

        .auth-form-label {
            display: block;
            font-size: 13px; color: var(--text-gray); font-weight: 600;
            margin-bottom: 6px;
            margin-top: 14px;
        }
        .auth-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--card-line);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-black);
            background: white;
            height: 44px;
        }
        .auth-input:focus { outline: none; border-color: var(--main); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12); }

        .auth-submit {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: linear-gradient(135deg, #047857, #10b981);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px; font-weight: 700;
            cursor: pointer;
            transition: transform .12s ease, box-shadow .12s ease;
        }
        .auth-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); }

        .auth-link-row {
            text-align: center;
            margin-top: 16px;
            font-size: 13px; color: var(--text-gray);
        }
        .auth-link-row a { color: var(--main-dark); font-weight: 700; text-decoration: none; }
        .auth-link-row a:hover { text-decoration: underline; }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 18px;
            border-top: 1px solid var(--card-line);
            font-size: 11px; color: var(--text-gray);
            line-height: 1.6;
        }

        .auth-error {
            display: none;
            padding: 10px 14px;
            background: var(--status-danger-bg);
            border: 1px solid var(--status-danger-border);
            border-radius: 8px;
            color: var(--status-danger-fg);
            font-size: 13px;
            margin-top: 12px;
        }
        .auth-error.show { display: block; }
    </style>
</head>
<body>
    <main>
        <div class="auth-card">
            <!-- 로고 -->
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <div class="auth-logo-text">
                    <span class="gov">담양군청</span>
                    <span class="name">중대재해통합관리시스템</span>
                </div>
            </div>
            <div class="auth-title">외부 사용자 로그인</div>

            <!-- SSO 안내 (내부 직원용) -->
            <div class="auth-sso-notice">
                <span class="icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                </span>
                <span class="body">
                    <strong>담양군청 공무원이신가요?</strong>
                    <a class="auth-sso-link" href="auth-sso.html">
                        행정포털에서 접속하기
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
                    </a>
                </span>
            </div>

            <div class="auth-divider">또는 외부 사용자 계정으로 로그인</div>

            <!-- 로그인 폼 -->
            <form onsubmit="event.preventDefault(); window.location.href='dashboard-ext.html';">
                <label class="auth-form-label" for="login-id">아이디</label>
                <input class="auth-input" type="text" id="login-id" placeholder="발급받은 아이디" required>

                <label class="auth-form-label" for="login-pw">비밀번호</label>
                <input class="auth-input" type="password" id="login-pw" placeholder="비밀번호" required>

                <div class="auth-error" id="auth-error">
                    아이디 또는 비밀번호가 일치하지 않습니다.
                </div>

                <button type="submit" class="auth-submit">로그인</button>
            </form>

            <div class="auth-link-row">
                비밀번호를 잊으셨나요? <a href="auth-password-reset.html">재설정</a>
            </div>

            <div class="auth-footer">
                외부 사용자 계정은 도급계약·컨설팅 위임 시 담당자가 발급합니다.<br>
                계정 발급 문의: 안전건설과 (061-380-XXXX)
            </div>
        </div>
    </main>
</body>
</html>
