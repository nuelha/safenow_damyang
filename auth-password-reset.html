<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - 담양군 중대재해예방통합관리시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #047857 0%, #10b981 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        body > main { width: 100%; max-width: 460px; }

        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18);
        }
        .auth-logo {
            display: flex; align-items: center; gap: 10px;
            justify-content: center;
            margin-bottom: 8px;
        }
        .auth-logo-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #047857, #10b981);
            color: white;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .auth-logo-text { display: flex; flex-direction: column; line-height: 1.2; }
        .auth-logo-text .gov { font-size: 11px; color: var(--text-gray); }
        .auth-logo-text .name { font-size: 16px; font-weight: 800; color: var(--main-dark2); }

        .auth-page-title {
            text-align: center;
            font-size: 18px; font-weight: 800;
            color: var(--main-dark2);
            margin-top: 20px;
            margin-bottom: 8px;
        }
        .auth-page-desc {
            text-align: center;
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 28px;
            line-height: 1.6;
        }

        /* Step 인디케이터 */
        .reset-steps {
            display: flex; align-items: center; gap: 4px;
            margin-bottom: 24px;
        }
        .reset-step {
            flex: 1;
            text-align: center;
            font-size: 11px;
            color: var(--text-gray);
            padding: 8px 6px;
            border-radius: 8px;
            background: var(--gray-100);
        }
        .reset-step.is-active { background: var(--brand-100); color: var(--main-dark); font-weight: 700; }
        .reset-step.is-done { background: var(--status-success-bg); color: var(--status-success-fg); font-weight: 700; }

        .reset-panel { display: none; }
        .reset-panel.is-active { display: block; }

        .auth-form-label {
            display: block;
            font-size: 13px; color: var(--text-gray); font-weight: 600;
            margin-bottom: 6px;
            margin-top: 14px;
        }
        .auth-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--card-line);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-black);
            background: white;
            height: 44px;
        }
        .auth-input:focus { outline: none; border-color: var(--main); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12); }

        .auth-submit {
            width: 100%;
            margin-top: 22px;
            padding: 12px;
            background: linear-gradient(135deg, #047857, #10b981);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px; font-weight: 700;
            cursor: pointer;
        }
        .auth-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); }

        .auth-link-row {
            text-align: center;
            margin-top: 16px;
            font-size: 13px; color: var(--text-gray);
        }
        .auth-link-row a { color: var(--main-dark); font-weight: 700; text-decoration: none; }

        /* 비밀번호 규칙 체크 */
        .pwd-rules {
            margin-top: 8px;
            padding: 12px 14px;
            background: var(--gray-100);
            border-radius: 8px;
            font-size: 12px;
        }
        .pwd-rule {
            display: flex; align-items: center; gap: 6px;
            color: var(--text-gray);
            padding: 2px 0;
        }
        .pwd-rule.is-met { color: var(--status-success-fg); }
        .pwd-rule .check { font-size: 11px; }

        /* 성공 메시지 */
        .reset-success-msg {
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            padding: 20px 0;
            text-align: center;
        }
        .reset-success-icon {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: var(--brand-100);
            color: var(--status-success-fg);
            display: inline-flex; align-items: center; justify-content: center;
        }
        .reset-success-text { font-size: 15px; color: var(--text-black); line-height: 1.6; }
        .reset-success-text strong { color: var(--main-dark2); font-weight: 700; }
    </style>
</head>
<body>
    <main>
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <div class="auth-logo-text">
                    <span class="gov">담양군청</span>
                    <span class="name">중대재해통합관리시스템</span>
                </div>
            </div>

            <div class="auth-page-title">비밀번호 재설정</div>
            <div class="auth-page-desc">가입 시 등록한 이메일로 재설정 링크를 보내드립니다.</div>

            <!-- 3단계 인디케이터 -->
            <div class="reset-steps">
                <div class="reset-step is-active" id="step1-ind">① 이메일 입력</div>
                <div class="reset-step" id="step2-ind">② 인증 코드</div>
                <div class="reset-step" id="step3-ind">③ 새 비밀번호</div>
            </div>

            <!-- Step 1: 이메일 -->
            <div class="reset-panel is-active" data-step="1">
                <label class="auth-form-label" for="reset-email">이메일</label>
                <input class="auth-input" type="email" id="reset-email" placeholder="등록된 이메일 입력" value="kim@a.co.kr">
                <button type="button" class="auth-submit" onclick="window.ResetForm.go(2)">
                    인증 코드 발송
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-left: 4px;"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>

            <!-- Step 2: 인증 코드 -->
            <div class="reset-panel" data-step="2">
                <div style="text-align: center; font-size: 13px; color: var(--text-gray); margin-bottom: 8px;">
                    <strong style="color: var(--main-dark2);">kim@a.co.kr</strong>로<br>
                    6자리 인증 코드를 발송했습니다.
                </div>
                <label class="auth-form-label" for="reset-code">인증 코드 (6자리)</label>
                <input class="auth-input" type="text" id="reset-code" placeholder="000000" maxlength="6" style="font-size: 18px; letter-spacing: 4px; text-align: center; font-weight: 700;">
                <div style="text-align: center; font-size: 12px; color: var(--text-gray); margin-top: 8px;">
                    남은 시간: <strong style="color: var(--status-warning-fg);" id="reset-timer">04:58</strong>
                    · <a href="#" style="color: var(--main-dark); font-weight: 700; text-decoration: none;" onclick="event.preventDefault();">코드 재발송</a>
                </div>
                <button type="button" class="auth-submit" onclick="window.ResetForm.go(3)">다음</button>
            </div>

            <!-- Step 3: 새 비밀번호 -->
            <div class="reset-panel" data-step="3">
                <label class="auth-form-label" for="reset-new-pw">새 비밀번호</label>
                <input class="auth-input" type="password" id="reset-new-pw" placeholder="새 비밀번호" value="">
                <div class="pwd-rules">
                    <div class="pwd-rule" id="rule-len">
                        <span class="check">○</span> 8자 이상
                    </div>
                    <div class="pwd-rule" id="rule-alpha">
                        <span class="check">○</span> 영문자 포함
                    </div>
                    <div class="pwd-rule" id="rule-num">
                        <span class="check">○</span> 숫자 포함
                    </div>
                    <div class="pwd-rule" id="rule-spec">
                        <span class="check">○</span> 특수문자 포함
                    </div>
                </div>

                <label class="auth-form-label" for="reset-pw-confirm">새 비밀번호 확인</label>
                <input class="auth-input" type="password" id="reset-pw-confirm" placeholder="다시 입력">

                <button type="button" class="auth-submit" onclick="window.ResetForm.go(4)">비밀번호 변경</button>
            </div>

            <!-- Step 4: 완료 -->
            <div class="reset-panel" data-step="4">
                <div class="reset-success-msg">
                    <div class="reset-success-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                    <div class="reset-success-text">
                        <strong>비밀번호가 변경되었습니다</strong><br>
                        새 비밀번호로 로그인해 주세요.
                    </div>
                </div>
                <button type="button" class="auth-submit" onclick="window.location.href='auth-login.html'">로그인 페이지로</button>
            </div>

            <div class="auth-link-row">
                <a href="auth-login.html">← 로그인으로 돌아가기</a>
            </div>
        </div>
    </main>

    <script>
        (function () {
            'use strict';
            const indicators = [document.getElementById('step1-ind'), document.getElementById('step2-ind'), document.getElementById('step3-ind')];
            window.ResetForm = {
                go(n) {
                    document.querySelectorAll('.reset-panel').forEach(p => {
                        p.classList.toggle('is-active', parseInt(p.dataset.step, 10) === n);
                    });
                    indicators.forEach((el, i) => {
                        el.classList.toggle('is-active', i + 1 === n);
                        el.classList.toggle('is-done', i + 1 < n);
                    });
                }
            };

            // 비밀번호 규칙 실시간 검증
            const pwInput = document.getElementById('reset-new-pw');
            if (pwInput) {
                pwInput.addEventListener('input', () => {
                    const v = pwInput.value;
                    document.getElementById('rule-len').classList.toggle('is-met', v.length >= 8);
                    document.getElementById('rule-alpha').classList.toggle('is-met', /[a-zA-Z]/.test(v));
                    document.getElementById('rule-num').classList.toggle('is-met', /\d/.test(v));
                    document.getElementById('rule-spec').classList.toggle('is-met', /[!@#$%^&*(),.?":{}|<>]/.test(v));
                    document.querySelectorAll('.pwd-rule.is-met .check').forEach(c => c.textContent = '✓');
                    document.querySelectorAll('.pwd-rule:not(.is-met) .check').forEach(c => c.textContent = '○');
                });
            }
        })();
    </script>
</body>
</html>
