<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예방 항목 트리 - 담양군 중대재해예방통합관리시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        /* ─── BGT02-V 전용 ─── */

        .bgt-tabs {
            display: flex; align-items: center; gap: 4px;
            border-bottom: 1px solid var(--card-line);
        }
        .bgt-tab {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 18px;
            font-size: 14px; font-weight: 600;
            color: var(--text-gray);
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            margin-bottom: -1px;
            transition: all .15s ease;
            text-decoration: none;
        }
        .bgt-tab:hover { color: var(--main-dark); }
        .bgt-tab.is-active {
            color: var(--main-dark2);
            border-bottom-color: var(--main);
        }

        /* 필터 바 */
        .bgt-tree-filter {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 22px;
            background: white;
            border: 1px solid var(--card-line);
            border-radius: var(--radius-card);
            flex-wrap: wrap;
        }
        .bgt-tree-filter .group {
            display: flex; align-items: center; gap: 6px;
        }
        .bgt-tree-filter label { font-size: 13px; font-weight: 600; color: var(--text-gray); }
        .bgt-tree-filter select {
            padding: 6px 24px 6px 10px;
            font-size: 13px; font-weight: 600;
            color: var(--text-black);
            border: 1px solid var(--card-line);
            border-radius: 6px;
            background-color: white;
            background-position: right 8px center;
        }
        .bgt-depth-toggle {
            display: inline-flex;
            border: 1px solid var(--card-line);
            border-radius: 6px;
            overflow: hidden;
            background: white;
        }
        .bgt-depth-btn {
            padding: 6px 12px;
            font-size: 12px; font-weight: 600;
            color: var(--text-gray);
            background: white;
            border: none;
            border-right: 1px solid var(--card-line);
            cursor: pointer;
        }
        .bgt-depth-btn:last-child { border-right: none; }
        .bgt-depth-btn.is-active {
            background: var(--main);
            color: white;
        }
        .bgt-tree-search {
            display: flex; align-items: center; gap: 4px;
            padding: 6px 10px;
            border: 1px solid var(--card-line);
            border-radius: 6px;
            background: white;
        }
        .bgt-tree-search input {
            border: none; outline: none;
            font-size: 13px;
            width: 200px;
            background: transparent;
        }

        /* 부서 그룹 카드 */
        .bgt-tree-group {
            background: white;
            border: 1px solid var(--card-line);
            border-radius: var(--radius-card);
            overflow: hidden;
        }
        .bgt-tree-group + .bgt-tree-group { margin-top: 14px; }
        .bgt-tree-group-head {
            padding: 14px 22px;
            border-bottom: 1px solid var(--card-line);
            display: flex; align-items: center; justify-content: space-between;
            background: #fafbfb;
        }
        .bgt-tree-group-head .title {
            display: flex; align-items: center; gap: 10px;
            font-size: 16px; font-weight: 700;
            color: var(--main-dark2);
            letter-spacing: -0.3px;
        }
        .bgt-tree-group-head .title .badge {
            font-size: 11px; font-weight: 700;
            padding: 2px 8px;
            border-radius: 999px;
            background: var(--brand-100);
            color: var(--main-dark);
        }
        .bgt-tree-group-head .title .badge.dept {
            background: var(--status-info-bg);
            color: var(--status-info-fg);
        }
        .bgt-tree-group-head .meta {
            font-size: 12px; color: var(--text-gray);
        }
        .bgt-tree-group-head .meta strong { color: var(--text-black); font-weight: 700; }

        /* 트리 노드 */
        .bgt-tree-body {
            padding: 8px 0;
        }
        .bgt-node {
            display: flex; flex-direction: column;
        }
        .bgt-node-row {
            display: grid;
            grid-template-columns: 22px 1fr 130px 130px 130px 140px;
            gap: 10px;
            align-items: center;
            padding: 10px 22px;
            border-bottom: 1px solid var(--card-line);
            cursor: pointer;
            transition: background .12s ease;
            position: relative;
        }
        .bgt-node-row:hover { background: var(--brand-50); }
        .bgt-node-row:hover .bgt-node-actions { visibility: visible; }
        .bgt-node.is-active > .bgt-node-row { background: var(--brand-100); }
        .bgt-node-row.depth-1 { font-weight: 700; }
        .bgt-node-row.depth-2 { padding-left: 50px; }
        .bgt-node-row.depth-3 { padding-left: 80px; }

        .bgt-toggle {
            width: 22px; height: 22px;
            display: inline-flex; align-items: center; justify-content: center;
            color: var(--text-lightgray);
            cursor: pointer;
            border-radius: 4px;
            transition: transform .15s ease;
        }
        .bgt-toggle:hover { background: var(--gray-100); color: var(--main); }
        .bgt-node.is-collapsed > .bgt-node-row > .bgt-toggle.has-children {
            transform: rotate(-90deg);
        }
        .bgt-toggle.empty { visibility: hidden; }

        .bgt-node-name {
            display: flex; align-items: center; gap: 8px;
            min-width: 0;
            color: var(--text-black);
        }
        .bgt-node-name .depth-badge {
            font-size: 10px; font-weight: 700;
            padding: 1px 6px;
            border-radius: 3px;
            background: var(--gray-100);
            color: var(--text-gray);
            flex-shrink: 0;
        }
        .bgt-node-row.depth-1 .bgt-node-name .depth-badge {
            background: var(--brand-100);
            color: var(--main-dark);
        }
        .bgt-node-row.depth-2 .bgt-node-name .depth-badge {
            background: var(--status-info-bg);
            color: var(--status-info-fg);
        }
        .bgt-node-name .label {
            flex: 1;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .bgt-node-name .label.dept-mark {
            color: var(--main-dark);
        }

        .bgt-node-amount {
            font-size: 13px;
            font-variant-numeric: tabular-nums;
            text-align: right;
            font-weight: 700;
            color: var(--text-black);
            white-space: nowrap;
        }
        .bgt-node-amount .unit {
            font-size: 11px; font-weight: 500;
            color: var(--text-gray); margin-left: 2px;
        }
        .bgt-node-amount.exec { color: var(--main-dark); }

        .bgt-node-rate {
            display: flex; align-items: center; gap: 6px;
            font-variant-numeric: tabular-nums;
        }
        .bgt-node-rate .bar {
            flex: 1;
            height: 5px;
            background: var(--gray-100);
            border-radius: 999px;
            overflow: hidden;
            max-width: 80px;
        }
        .bgt-node-rate .bar > div {
            height: 100%;
            border-radius: 999px;
            background: var(--main);
        }
        .bgt-node-rate .bar > div.warning { background: var(--status-warning-fg); }
        .bgt-node-rate .bar > div.danger { background: var(--status-danger-fg); }
        .bgt-node-rate .text {
            font-size: 12px; font-weight: 700;
            min-width: 36px; text-align: right;
            color: var(--text-black);
        }
        .bgt-node-rate .text.warn { color: var(--status-warning-fg); }
        .bgt-node-rate .text.danger { color: var(--status-danger-fg); }

        .bgt-node-actions {
            display: flex; gap: 4px; justify-content: flex-end;
            visibility: hidden;
        }
        .bgt-node-actions .action {
            display: inline-flex; align-items: center; gap: 3px;
            padding: 3px 8px;
            font-size: 11px; font-weight: 600;
            border-radius: 4px;
            background: white;
            border: 1px solid var(--card-line);
            color: var(--text-black);
            cursor: pointer;
            text-decoration: none;
        }
        .bgt-node-actions .action:hover {
            border-color: var(--main);
            color: var(--main);
            background: var(--brand-50);
        }
        .bgt-node-actions .action.primary {
            background: var(--main);
            color: white;
            border-color: var(--main);
        }
        .bgt-node-actions .action.primary:hover { background: var(--main-dark); border-color: var(--main-dark); }

        .bgt-node-children {
            display: flex; flex-direction: column;
        }
        .bgt-node.is-collapsed > .bgt-node-children { display: none; }

        /* 검색 매칭 강조 */
        .bgt-node-name .label.match {
            background: rgba(255, 235, 59, 0.4);
            padding: 1px 4px;
            border-radius: 3px;
        }

        /* 결과 카운트 */
        .bgt-meta-row { display: flex; align-items: center; gap: 12px; }
        .bgt-meta-count { font-size: 14px; color: var(--text-gray); }
        .bgt-meta-count strong { color: var(--main); font-weight: 700; }

        /* 항목 추가 모달 */
        .bgt-modal-backdrop {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.5);
            display: none;
            align-items: center; justify-content: center;
            z-index: 100;
            padding: 20px;
        }
        .bgt-modal-backdrop.is-open { display: flex; }
        .bgt-modal {
            background: white;
            border-radius: var(--radius-card);
            width: 100%; max-width: 540px;
            max-height: 90vh; overflow: hidden;
            display: flex; flex-direction: column;
            box-shadow: 0 16px 40px rgba(0,0,0,0.2);
        }
        .bgt-modal-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--card-line);
            display: flex; align-items: center; justify-content: space-between;
        }
        .bgt-modal-title {
            font-size: 18px; font-weight: 700; color: var(--main-dark2);
        }
        .bgt-modal-close {
            width: 32px; height: 32px;
            display: inline-flex; align-items: center; justify-content: center;
            background: none; border: none; cursor: pointer;
            color: var(--text-gray);
            border-radius: 8px;
        }
        .bgt-modal-close:hover { background: var(--gray-100); color: var(--text-black); }
        .bgt-modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
        .bgt-modal-footer {
            padding: 14px 24px;
            border-top: 1px solid var(--card-line);
            display: flex; justify-content: flex-end; gap: 8px;
        }
        .bgt-form-row { margin-bottom: 14px; }
        .bgt-form-row .label {
            display: block;
            font-size: 13px; font-weight: 600;
            color: var(--text-black);
            margin-bottom: 6px;
        }
        .bgt-form-row .label .req { color: var(--status-danger-fg); margin-left: 2px; }
        .bgt-form-row input,
        .bgt-form-row select {
            width: 100%;
            padding: 8px 12px;
            font-size: 13px;
            border: 1px solid var(--card-line);
            border-radius: var(--radius-button);
            outline: none;
        }
        .bgt-form-row input:focus,
        .bgt-form-row select:focus {
            border-color: var(--main);
            box-shadow: 0 0 0 3px rgba(32, 159, 132, 0.12);
        }
        .bgt-radio-group {
            display: flex; gap: 10px;
        }
        .bgt-radio-group label {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 12px;
            border: 1px solid var(--card-line);
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            flex: 1;
            justify-content: center;
        }
        .bgt-radio-group input { width: auto; margin: 0; }
        .bgt-radio-group input:checked + span { color: var(--main); font-weight: 700; }
        .bgt-form-hint {
            font-size: 12px; color: var(--text-gray);
            margin-top: 4px;
        }

        @media (max-width: 1023px) {
            .bgt-node-row {
                grid-template-columns: 22px 1fr;
                gap: 6px;
            }
            .bgt-node-row > div:nth-child(n+3) {
                grid-column: 2 / -1;
                padding-left: 0;
                font-size: 12px;
            }
            .bgt-node-row.depth-2 { padding-left: 38px; }
            .bgt-node-row.depth-3 { padding-left: 58px; }
            .bgt-node-actions { visibility: visible; }
        }
    </style>
</head>
<body data-dy-page="bgt-status" data-page-title="예산 — 예방 항목 트리" data-page-subtitle="안전보건 예방 항목 3단계 트리 관리 (결정사항 #22)">
    <main>

        </div>

        <!-- ─── 필터 ─── -->
        <div class="bgt-tree-filter">
            <div class="group">
                <label>부서</label>
                <select id="filter-dept">
                    <option value="all">전체 (공통 + 부서)</option>
                    <option value="common">공통 항목만</option>

                    <button class="bgt-depth-btn" type="button" data-depth="2">2단계까지</button>

        <div class="bgt-meta-row">

        </div>

        <!-- ─── 트리 그룹들 ─── -->
        <div id="tree-container"></div>

    </main>

    <div id="toast" class="toast" role="status"></div>

    <script src="./js/layout.js"></script>
    <script>
    (function () {
        'use strict';

        function showToast(msg) {
            const t = document.getElementById('toast');
            if (!t) return;
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(window.__toastTimer);
            window.__toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
        }

        function fmt(n) { return n.toLocaleString(); }
        function rateClass(r) { return r >= 70 ? '' : r >= 55 ? 'warning' : 'danger'; }
        function rateTextClass(r) { return r >= 70 ? '' : r >= 55 ? 'warn' : 'danger'; }

        /* ─── 트리 데이터 ─── */
        const TREE = [
            {
                deptId: 'common', deptName: '공통 항목 (전 부서 사용)',
                description: '시스템 표준 — department_id=NULL',
                deptBadge: '공통',
                items: [
                    { id: 'edu', code: 'EDU', name: '안전보건교육', alloc: 350000, exec: 245000, children: [
                        { id: 'edu-1', code: 'EDU-01', name: '정기교육', alloc: 200000, exec: 140000, children: [
                            { id: 'edu-1-1', code: 'EDU-01-01', name: '사무직 정기교육 (반기 6h)', alloc: 40000, exec: 28000 },
                            { id: 'edu-1-2', code: 'EDU-01-02', name: '현장직 정기교육 (분기 6h)', alloc: 100000, exec: 75000 },
                            { id: 'edu-1-3', code: 'EDU-01-03', name: '관리감독자 정기교육 (연 16h)', alloc: 60000, exec: 37000 },
                        ]},
                        { id: 'edu-2', code: 'EDU-02', name: '신규 채용 교육', alloc: 80000, exec: 55000 },
                        { id: 'edu-3', code: 'EDU-03', name: '특별 안전보건교육', alloc: 70000, exec: 50000 },
                    ]},
                    { id: 'ins', code: 'INS', name: '시설 안전 점검', alloc: 280000, exec: 180000, children: [
                        { id: 'ins-1', code: 'INS-01', name: '정기 점검', alloc: 180000, exec: 115000, children: [
                            { id: 'ins-1-1', code: 'INS-01-01', name: '청사 분기 정기점검', alloc: 100000, exec: 65000 },
                            { id: 'ins-1-2', code: 'INS-01-02', name: '시설물 정기점검 (시설물안전법)', alloc: 80000, exec: 50000 },
                        ]},
                        { id: 'ins-2', code: 'INS-02', name: '수시 점검', alloc: 50000, exec: 35000 },
                        { id: 'ins-3', code: 'INS-03', name: '소방·전기·가스 점검', alloc: 50000, exec: 30000 },
                    ]},
                    { id: 'rsk', code: 'RSK', name: '위험성평가 시행', alloc: 150000, exec: 98000, children: [
                        { id: 'rsk-1', code: 'RSK-01', name: '정기 평가 (연 1회)', alloc: 100000, exec: 70000 },
                        { id: 'rsk-2', code: 'RSK-02', name: '수시 평가', alloc: 50000, exec: 28000 },
                    ]},
                    { id: 'ppe', code: 'PPE', name: '보호장비 구입', alloc: 200000, exec: 150000, children: [
                        { id: 'ppe-1', code: 'PPE-01', name: '개인 보호구 (안전모·안전화 등)', alloc: 130000, exec: 100000 },
                        { id: 'ppe-2', code: 'PPE-02', name: '비상장비 (소화기·AED·구급함)', alloc: 70000, exec: 50000 },
                    ]},
                    { id: 'con', code: 'CON', name: '도급사업 안전관리', alloc: 270000, exec: 152000, children: [
                        { id: 'con-1', code: 'CON-01', name: '도급 적격성 평가', alloc: 80000, exec: 50000 },
                        { id: 'con-2', code: 'CON-02', name: '협의체 운영', alloc: 70000, exec: 42000 },
                        { id: 'con-3', code: 'CON-03', name: 'TBM 운영 비용', alloc: 60000, exec: 35000 },
                        { id: 'con-4', code: 'CON-04', name: '도급 안전사고 대응', alloc: 60000, exec: 25000 },
                    ]},
                ]
            },
            {
                deptId: 'jachi', deptName: '자치행정과 특화 항목',
                description: '본 부서만 사용 — department_id=jachi',
                deptBadge: '자치행정과',
                items: [
                    { id: 'j-1', code: 'JACHI-01', name: '청사 시설관리 (부서 특화)', alloc: 80000, exec: 55000, deptMark: true, children: [
                        { id: 'j-1-1', code: 'JACHI-01-01', name: '본관 전기 안전관리', alloc: 50000, exec: 35000 },
                        { id: 'j-1-2', code: 'JACHI-01-02', name: '별관 소방 점검', alloc: 30000, exec: 20000 },
                    ]},
                ]
            },
            {
                deptId: 'farm', deptName: '농업기술센터 특화 항목',
                description: '본 부서만 사용 — department_id=farm',
                deptBadge: '농업기술센터',
                items: [
                    { id: 'f-1', code: 'FARM-01', name: '농기계 안전관리 (부서 특화)', alloc: 90000, exec: 60000, deptMark: true, children: [
                        { id: 'f-1-1', code: 'FARM-01-01', name: '농기계 정기 점검', alloc: 50000, exec: 35000 },
                        { id: 'f-1-2', code: 'FARM-01-02', name: '농기계 사용자 교육', alloc: 25000, exec: 15000 },
                        { id: 'f-1-3', code: 'FARM-01-03', name: '농기계 보호장비', alloc: 15000, exec: 10000 },
                    ]},
                ]
            },
            {
                deptId: 'facility', deptName: '시설관리과 특화 항목',
                description: '본 부서만 사용 — department_id=facility',
                deptBadge: '시설관리과',
                items: [
                    { id: 'fc-1', code: 'FAC-01', name: '체육관 운영 안전관리 (부서 특화)', alloc: 50000, exec: 35000, deptMark: true, children: [
                        { id: 'fc-1-1', code: 'FAC-01-01', name: '체육관 시설 점검', alloc: 30000, exec: 22000 },
                        { id: 'fc-1-2', code: 'FAC-01-02', name: '체육관 보호장비', alloc: 20000, exec: 13000 },
                    ]},
                ]
            },
        ];

        /* ─── 상태 ─── */
        const collapsed = new Set();
        let depthLimit = 3;
        let searchQ = '';
        let deptFilter = 'all';
        let totalVisible = 0;

        /* ─── 렌더 ─── */
        const container = document.getElementById('tree-container');

        function renderNode(node, depth, deptDeptMark) {
            const hasChildren = node.children && node.children.length;
            if (depth > depthLimit) return '';
            const isCollapsed = collapsed.has(node.id);
            const rate = node.alloc > 0 ? Math.round((node.exec / node.alloc) * 100) : 0;
            const remaining = node.alloc - node.exec;

            let nameMatched = node.name;
            if (searchQ && node.name.includes(searchQ)) {
                nameMatched = node.name.replace(new RegExp(searchQ, 'g'), `<span class="match">${searchQ}</span>`);
            }

            totalVisible++;

            const toggle = hasChildren
                ? `<span class="bgt-toggle has-children" data-toggle="${node.id}">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                  </span>`
                : `<span class="bgt-toggle empty"></span>`;

            const childrenHtml = hasChildren && depth < depthLimit
                ? `<div class="bgt-node-children">${node.children.map(c => renderNode(c, depth + 1, deptDeptMark)).join('')}</div>`
                : '';

            return `
                <div class="bgt-node ${isCollapsed ? 'is-collapsed' : ''}" data-id="${node.id}">
                    <div class="bgt-node-row depth-${depth}" data-node="${node.id}">
                        ${toggle}
                        <div class="bgt-node-name">
                            <span class="depth-badge">${depth}단계</span>
                            <span class="label ${node.deptMark ? 'dept-mark' : ''}">${nameMatched}</span>
                        </div>
                        <div class="bgt-node-amount">${fmt(node.alloc)}<span class="unit">천원</span></div>
                        <div class="bgt-node-amount exec">${fmt(node.exec)}<span class="unit">천원</span></div>
                        <div class="bgt-node-rate">
                            <div class="bar"><div class="${rateClass(rate)}" style="width:${rate}%;"></div></div>
                            <span class="text ${rateTextClass(rate)}">${rate}%</span>
                        </div>
                        <div class="bgt-node-actions">
                            <a class="action" href="bgt-establish.html" onclick="event.stopPropagation();">편성</a>
                            <a class="action" href="bgt-execute.html" onclick="event.stopPropagation();">집행</a>
                            <a class="action primary" href="#" onclick="event.preventDefault(); event.stopPropagation(); window.DYLayout._soon(event, '항목 수정 — ${node.name}');">수정</a>
                        </div>
                    </div>
                    ${childrenHtml}
                </div>
            `;
        }

        function renderGroup(group) {
            const items = group.items.map(it => renderNode(it, 1, group.deptId !== 'common')).join('');
            const totalAlloc = group.items.reduce((s, it) => s + it.alloc, 0);
            const totalExec = group.items.reduce((s, it) => s + it.exec, 0);
            const rate = totalAlloc > 0 ? Math.round((totalExec / totalAlloc) * 100) : 0;
            return `
                <div class="bgt-tree-group">
                    <div class="bgt-tree-group-head">
                        <div class="title">
                            ${group.deptName}
                            <span class="badge ${group.deptId === 'common' ? '' : 'dept'}">${group.deptBadge}</span>
                        </div>
                        <div class="meta">
                            편성 <strong>${fmt(totalAlloc)}천원</strong> · 집행 <strong>${fmt(totalExec)}천원</strong> · <strong>${rate}%</strong>
                        </div>
                    </div>
                    <div class="bgt-tree-body">${items}</div>
                </div>
            `;
        }

        function render() {
            totalVisible = 0;
            const groups = TREE.filter(g => {
                if (deptFilter === 'all') return true;
                if (deptFilter === 'common') return g.deptId === 'common';
                return g.deptId === deptFilter || g.deptId === 'common';
            });
            container.innerHTML = groups.map(renderGroup).join('') ||
                '<div class="card" style="padding:40px; text-align:center; color:var(--text-gray);">표시할 항목이 없습니다.</div>';
            document.getElementById('result-count').textContent = totalVisible;
        }

        /* 이벤트 위임 */
        container.addEventListener('click', (e) => {
            const toggle = e.target.closest('[data-toggle]');
            if (toggle) {
                e.stopPropagation();
                const id = toggle.dataset.toggle;
                if (collapsed.has(id)) collapsed.delete(id); else collapsed.add(id);
                render();
                return;
            }
            const node = e.target.closest('[data-node]');
            if (node && !e.target.closest('.bgt-node-actions')) {
                const id = node.dataset.node;
                document.querySelectorAll('.bgt-node.is-active').forEach(n => n.classList.remove('is-active'));
                node.parentElement.classList.add('is-active');
            }
        });

        /* 필터 이벤트 */
        document.getElementById('filter-dept').addEventListener('change', (e) => {
            deptFilter = e.target.value;
            render();
        });

        document.querySelectorAll('.bgt-depth-btn').forEach(b => {
            b.addEventListener('click', () => {
                document.querySelectorAll('.bgt-depth-btn').forEach(x => x.classList.remove('is-active'));
                b.classList.add('is-active');
                depthLimit = parseInt(b.dataset.depth);
                render();
            });
        });

        let searchTimer = null;
        document.getElementById('filter-search').addEventListener('input', (e) => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                searchQ = e.target.value.trim();
                // 검색어 있으면 자동 펼침
                if (searchQ) collapsed.clear();
                render();
            }, 250);
        });

        /* 항목 추가 모달 */
        window.openAddModal = function () {
            document.getElementById('add-modal').classList.add('is-open');
        };
        window.closeAddModal = function () {
            document.getElementById('add-modal').classList.remove('is-open');
        };
        window.saveItem = function () {
            window.closeAddModal();
            showToast('예방 항목이 추가되었습니다. (목업)');
        };
        document.querySelectorAll('.bgt-modal-backdrop').forEach(bd => {
            bd.addEventListener('click', (e) => {
                if (e.target === bd) bd.classList.remove('is-open');
            });
        });

        render();
    })();
    </script>
</body>
</html>
