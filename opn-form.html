<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>의견 등록 - 담양군 중대재해예방통합관리시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        /* ─── OPN01-F 전용 ─── */

        .opn-form-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            row-gap: 18px;
            column-gap: 16px;
            padding: 24px;
        }
        .opn-form-grid .label {
            font-size: 13px; color: var(--text-gray); font-weight: 600;
            line-height: 34px;
        }
        .opn-form-grid .label.required::after {
            content: " *"; color: var(--status-danger-fg);
        }
        .opn-form-grid .value { display: flex; flex-direction: column; gap: 6px; }

        .opn-cat-options {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        .opn-cat-option {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 12px 8px;
            background: white;
            border: 1px solid var(--card-line);
            border-radius: var(--radius-button);
            cursor: pointer;
            font-size: 13px; font-weight: 600;
            color: var(--text-gray);
            text-align: center;
            transition: all .12s ease;
        }
        .opn-cat-option:hover { border-color: var(--main); }
        .opn-cat-option input { display: none; }
        .opn-cat-option.is-selected.improve  { background: var(--brand-100); border-color: var(--status-success-border); color: var(--main-dark); }
        .opn-cat-option.is-selected.complain { background: var(--status-danger-bg); border-color: var(--status-danger-border); color: var(--status-danger-fg); }
        .opn-cat-option.is-selected.suggest  { background: var(--status-info-bg); border-color: var(--status-info-border); color: var(--status-info-fg); }
        .opn-cat-option.is-selected.danger   { background: var(--status-warning-bg); border-color: var(--status-warning-border); color: var(--status-warning-fg); }
        .opn-cat-option.is-selected.etc      { background: var(--gray-100); border-color: var(--text-lightgray); color: var(--text-black); }

        .opn-textarea {
            width: 100%;
            min-height: 140px;
            padding: 12px 14px;
            border: 1px solid var(--card-line);
            border-radius: var(--radius-button);
            font-size: 14px;
            color: var(--text-black);
            background: white;
            line-height: 1.6;
            resize: vertical;
        }
        .opn-textarea:focus {
            outline: none;
            border-color: var(--main);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .opn-input {
            width: 100%;
            padding: 8px 14px;
            border: 1px solid var(--card-line);
            border-radius: var(--radius-button);
            font-size: 14px;
            color: var(--text-black);
            background: white;
            height: 36px;
        }

        .opn-hint { font-size: 12px; color: var(--text-gray); }
        .opn-hint.warn { color: var(--status-warning-fg); }

        /* 익명 옵션 */
        .opn-anon-option {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 14px 16px;
            background: var(--status-info-bg);
            border: 1px solid var(--status-info-border);
            border-radius: var(--radius-button);
        }
        .opn-anon-option input[type=checkbox] {
            margin-top: 2px;
        }
        .opn-anon-text { font-size: 13px; color: var(--status-info-fg); line-height: 1.5; }
        .opn-anon-text strong { font-weight: 700; }

        /* 첨부 영역 */
        .opn-attach-zone {
            border: 2px dashed var(--card-line);
            border-radius: var(--radius-button);
            padding: 24px;
            text-align: center;
            background: white;
            cursor: pointer;
            transition: all .12s ease;
        }
        .opn-attach-zone:hover { border-color: var(--main); background: var(--brand-100); }
        .opn-attach-zone .icon {
            display: inline-flex;
            color: var(--main);
            margin-bottom: 8px;
        }
        .opn-attach-zone .text { font-size: 13px; color: var(--text-black); font-weight: 600; }
        .opn-attach-zone .hint { font-size: 11px; color: var(--text-gray); margin-top: 4px; }
        .opn-attach-list {
            display: flex; flex-direction: column; gap: 6px;
            margin-top: 8px;
        }
        .opn-attach-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px;
            background: var(--gray-100);
            border-radius: var(--radius-button);
            font-size: 12px;
        }
        .opn-attach-item .name { flex: 1; color: var(--text-black); font-weight: 600; }
        .opn-attach-item .size { color: var(--text-gray); }
        .opn-attach-item .remove {
            background: none; border: none; cursor: pointer;
            color: var(--text-gray);
            display: inline-flex; align-items: center;
        }
        .opn-attach-item .remove:hover { color: var(--status-danger-fg); }

        /* 폼 액션 */
        .opn-form-actions {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px;
            border-top: 1px solid var(--card-line);
            background: var(--brand-100);
        }
        .opn-form-actions .left { font-size: 12px; color: var(--text-gray); }
        .opn-form-actions .buttons { display: flex; gap: 8px; }
    </style>
</head>
<body data-dy-page="opinion" data-page-title="의견 등록" data-page-subtitle="안전·보건 관련 의견·제안·신고를 등록합니다 (산안법 §75)">
    <main>

        <!-- ─── 상단 툴바 ─── -->
        <div class="detail-topbar">
            <a class="detail-back-link" href="opinion.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                의견 목록
            </a>
        </div>

        <!-- ─── 폼 ─── -->
        <section class="card" style="padding: 0;">
            <div class="card-header" style="padding: 16px 24px;">
                <h2 class="card-title">의견 등록</h2>
                <span class="text-muted" style="font-size:13px;">접수 후 담당자 지정 + SLA 5일 내 1차 답변</span>
            </div>

            <div class="opn-form-grid">
                <!-- 카테고리 -->
                <span class="label required">카테고리</span>
                <div class="value">
                    <div class="opn-cat-options" id="cat-options">
                        <label class="opn-cat-option" data-cat="improve">
                            <input type="radio" name="category" value="improve">
                            개선 제안
                        </label>
                        <label class="opn-cat-option is-selected danger" data-cat="danger">
                            <input type="radio" name="category" value="danger" checked>
                            위험 신고
                        </label>
                        <label class="opn-cat-option" data-cat="complain">
                            <input type="radio" name="category" value="complain">
                            불만 / 신고
                        </label>
                        <label class="opn-cat-option" data-cat="suggest">
                            <input type="radio" name="category" value="suggest">
                            건의 / 문의
                        </label>
                        <label class="opn-cat-option" data-cat="etc">
                            <input type="radio" name="category" value="etc">
                            기타
                        </label>
                    </div>
                    <span class="opn-hint">위험 신고 선택 시 24시간 내 우선 처리됩니다.</span>
                </div>

                <!-- 제목 -->
                <span class="label required">제목</span>
                <div class="value">
                    <input class="opn-input" type="text" placeholder="의견을 한 줄로 요약" value="주차장 야간 조명 부족 — 보행자 충돌 위험">
                </div>

                <!-- 본문 -->
                <span class="label required">상세 내용</span>
                <div class="value">
                    <textarea class="opn-textarea" placeholder="구체적 상황·위치·시간·발생 가능성·요청 사항 등을 작성하세요.">군청 본관 후면 주차장의 야간 조명이 부족하여 21시 이후 출입 시 보행자 사고 위험이 있습니다. 특히 동절기 야근 직원이 차량 후진 시 사각지대에서 보행자를 인지하기 어렵습니다.

요청: 본관 후면 주차장 진출입구 2개소에 LED 보안등(또는 인체감지 센서등) 추가 설치 검토 부탁드립니다.</textarea>
                    <span class="opn-hint">최대 2000자 · <strong style="color:var(--text-black);">208 / 2000</strong></span>
                </div>

                <!-- 발생 장소 -->
                <span class="label">발생 장소</span>
                <div class="value">
                    <input class="opn-input" type="text" placeholder="관리대상명 또는 구체적 위치" value="군청 본관 후면 주차장">
                </div>

                <!-- 관련 부서 -->
                <span class="label required">관련 부서</span>
                <div class="value">
                    <select class="opn-input">
                        <option>자치행정과 (선택됨)</option>
                        <option>시설관리과</option>
                        <option>환경과</option>
                        <option>상수도사업소</option>
                        <option>안전건설과</option>
                        <option>보건소</option>
                    </select>
                </div>

                <!-- 익명 옵션 -->
                <span class="label">제출 방식</span>
                <div class="value">
                    <div class="opn-anon-option">
                        <input type="checkbox" id="opn-anon" checked>
                        <label for="opn-anon" class="opn-anon-text">
                            <strong>익명으로 제출</strong> — 작성자 정보가 처리 담당자에게 노출되지 않습니다.<br>
                            <span style="font-size:11px;">단, 제출 이력은 시스템에 기록되며 법적 분쟁 시 열람될 수 있습니다.</span>
                        </label>
                    </div>
                </div>

                <!-- 첨부 -->
                <span class="label">첨부 파일</span>
                <div class="value">
                    <div class="opn-attach-zone" onclick="window.DYLayout._soon(event, '파일 선택')">
                        <div class="icon">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        </div>
                        <div class="text">사진 · 동영상 · 문서 첨부</div>
                        <div class="hint">최대 5개 파일 · 파일당 20MB · jpg, png, mp4, pdf, hwp</div>
                    </div>
                    <div class="opn-attach-list">
                        <div class="opn-attach-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--main);"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            <span class="name">parking_night_view.jpg</span>
                            <span class="size">2.4 MB</span>
                            <button class="remove" type="button" aria-label="삭제">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 알림 받기 -->
                <span class="label">처리 진행 알림</span>
                <div class="value">
                    <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-black);">
                        <input type="checkbox" checked>
                        본인 알림함으로 처리 단계 진행 사항 받기 (익명 제출이라도 본인은 추적 가능)
                    </label>
                </div>
            </div>

            <div class="opn-form-actions">
                <div class="left">제출 후에는 카테고리·익명 여부는 변경할 수 없습니다.</div>
                <div class="buttons">
                    <button class="btn btn-outline" type="button" onclick="window.history.back()">취소</button>
                    <button class="btn btn-primary" type="button" onclick="window.DYLayout._soon(event, '의견 제출 완료 — opinion.html로 이동')">
                        제출
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-left:4px;"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
            </div>
        </section>

    </main>

    <div id="toast" class="toast" role="status"></div>

    <script src="./js/layout.js"></script>
    <script>
    (function () {
        'use strict';
        document.querySelectorAll('#cat-options .opn-cat-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('#cat-options .opn-cat-option').forEach(x => {
                    x.classList.remove('is-selected', 'improve', 'complain', 'suggest', 'danger', 'etc');
                });
                opt.classList.add('is-selected', opt.dataset.cat);
            });
        });
    })();
    </script>
</body>
</html>
