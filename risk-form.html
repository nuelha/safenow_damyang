<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>위험성평가 등록 - 담양군 중대재해예방통합관리시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body data-dy-page="rsk-list"
      data-page-title="위험성평가 등록"
      data-page-subtitle="관리대상 · 평가유형 · 시행 기간 · 담당 인력을 입력하면 사전준비 단계로 등록됩니다"
      data-back-href="risk-list.html"
      data-back-label="평가 목록">
    <main>

        <!-- ─── 폼 카드 ─── -->
        <form id="rsk-form" autocomplete="off">
            <section class="card" style="overflow:visible;">
                <!-- ── 기본정보 ── -->
                <div class="form-section">
                    <h2 class="form-section-title">기본정보</h2>

                    <div class="form-field">
                        <label class="form-field-label" for="f-name">평가명 <span class="form-field-required">*</span></label>
                        <input class="form-input" type="text" id="f-name" name="name" placeholder="예: 청사 위험성평가 2026" maxlength="200" required>
                        <span class="form-field-help">1~200자 / 관리대상명과 연도를 포함하면 식별이 쉽습니다</span>
                    </div>

                    <div class="form-field">
                        <label class="form-field-label" for="f-target">관리대상 <span class="form-field-required">*</span></label>
                        <select class="form-select" id="f-target" name="target_id" required onchange="window.RskForm.onTargetChange(this)">
                            <option value="">-- 관리대상 선택 --</option>
                            <option value="t-1" data-dept="자치행정과" data-type="시설" data-cdpa="공중이용시설" data-grade="1종" data-last="2025-04-01 ~ 2025-05-31 (완료)">군청 청사 (시설)</option>
                            <option value="t-2" data-dept="시설관리과" data-type="시설" data-cdpa="공중이용시설" data-grade="2종" data-last="2025-03-15 ~ 2025-04-15 (완료)">군민체육관 (시설)</option>
                            <option value="t-3" data-dept="상수도사업소" data-type="시설" data-cdpa="원료·제조물" data-grade="2종" data-last="2025-01-10 ~ 2025-02-10 (완료)">상수도사업소 본관 (시설)</option>
                            <option value="t-4" data-dept="환경과" data-type="업무" data-cdpa="" data-grade="" data-last="해당 없음">환경자원시설 (업무)</option>
                            <option value="t-5" data-dept="시설관리과" data-type="사업" data-cdpa="" data-grade="" data-last="해당 없음 (신규)">군청 주차장 보강공사 (사업)</option>
                        </select>
                        <!-- 관리대상 선택 후 인라인 미리보기 -->
                        <div class="form-target-preview is-hidden" id="f-target-preview">
                            <div class="form-target-preview-row">
                                <span class="form-target-preview-label">담당부서</span>
                                <span class="form-target-preview-value" data-slot="dept">—</span>
                            </div>
                            <div class="form-target-preview-row">
                                <span class="form-target-preview-label">유형 / 분류</span>
                                <span class="form-target-preview-value" data-slot="type-info">—</span>
                            </div>
                            <div class="form-target-preview-row">
                                <span class="form-target-preview-label">마지막 평가</span>
                                <span class="form-target-preview-value" data-slot="last">—</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-field">
                        <label class="form-field-label">평가유형 <span class="form-field-required">*</span></label>
                        <div class="form-radio-group" role="radiogroup">
                            <label class="form-radio" data-value="regular">
                                <input type="radio" name="assessment_type" value="regular" onchange="window.RskForm.onTypeChange(this)" checked>
                                정기
                            </label>
                            <label class="form-radio" data-value="initial">
                                <input type="radio" name="assessment_type" value="initial" onchange="window.RskForm.onTypeChange(this)">
                                최초
                            </label>
                            <label class="form-radio" data-value="special">
                                <input type="radio" name="assessment_type" value="special" onchange="window.RskForm.onTypeChange(this)">
                                수시
                            </label>
                        </div>
                        <span class="form-field-help">정기는 시행확인 라벨 없음 · 최초/수시는 자동으로 라벨 부여</span>
                    </div>

                    <!-- 수시 선택 시 동적 노출 -->
                    <div class="form-conditional" id="f-trigger-block">
                        <div class="form-conditional-note">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            수시 평가는 트리거 정보가 필수입니다
                        </div>
                        <div class="form-field">
                            <label class="form-field-label">트리거 유형 <span class="form-field-required">*</span></label>
                            <div class="form-radio-group" role="radiogroup">
                                <label class="form-radio">
                                    <input type="radio" name="trigger_type" value="accident">사고
                                </label>
                                <label class="form-radio">
                                    <input type="radio" name="trigger_type" value="complaint">민원
                                </label>
                                <label class="form-radio">
                                    <input type="radio" name="trigger_type" value="change">중대변경
                                </label>
                                <label class="form-radio">
                                    <input type="radio" name="trigger_type" value="etc">기타
                                </label>
                            </div>
                        </div>
                        <div class="form-field">
                            <label class="form-field-label" for="f-trigger-desc">트리거 설명 <span class="form-field-required">*</span></label>
                            <textarea class="form-textarea" id="f-trigger-desc" name="trigger_description" placeholder="사고 ID·민원 번호·변경 사유 등을 구체적으로 기재"></textarea>
                        </div>
                    </div>
                </div>

                <!-- ── 평가 설정 ── -->
                <div class="form-section">
                    <h2 class="form-section-title">평가 설정</h2>

                    <div class="form-fields-row">
                        <div class="form-field">
                            <label class="form-field-label" for="f-method">평가 기법 <span class="form-field-required">*</span></label>
                            <select class="form-select" id="f-method" name="method" required>
                                <option value="">-- 기법 선택 --</option>
                                <option value="4M" selected>4M 위험성평가</option>
                                <option value="KRAS">KRAS 위험성평가</option>
                                <option value="CHECKLIST">체크리스트</option>
                                <option value="MATRIX">위험성 매트릭스</option>
                                <option value="JSA">JSA 위험성평가</option>
                            </select>
                            <span class="form-field-help">위험성평가 설정(RSK04-S)에서 기법을 추가할 수 있습니다</span>
                        </div>
                        <div class="form-field">
                            <label class="form-field-label">시행 기간 <span class="form-field-required">*</span></label>
                            <div class="form-date-range">
                                <input class="form-input" type="date" name="start_date" value="2026-05-15" required>
                                <span class="form-date-range-sep">~</span>
                                <input class="form-input" type="date" name="end_date" value="2026-06-15" required>
                            </div>
                            <span class="form-field-help">종료일은 시작일 이후여야 합니다</span>
                        </div>
                    </div>
                </div>

                <!-- ── 담당 인력 ── -->
                <div class="form-section">
                    <h2 class="form-section-title">담당 인력</h2>

                    <div class="form-field">
                        <label class="form-field-label" for="f-owner">담당자 <span class="form-field-required">*</span></label>
                        <div class="form-user-input">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            <input class="form-input" type="text" id="f-owner" name="owner" value="김안전 (자치행정과 · SHM)" placeholder="구성원 이름·이메일로 검색">
                        </div>
                        <span class="form-field-help">기본값: 현재 로그인 사용자 · 권한 범위 내 SHM/SM 권장</span>
                    </div>

                    <div class="form-field">
                        <label class="form-field-label" for="f-participants">참여자</label>
                        <div class="form-user-search">
                            <div class="form-user-input">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                                <input class="form-input" type="text" id="f-participants" placeholder="안전관리자·관리감독자·종사자 대표 등을 검색해 추가">
                            </div>
                            <div class="form-user-chips">
                                <span class="form-user-chip">박안전 (자치행정과)<button type="button" class="remove" aria-label="제거">×</button></span>
                                <span class="form-user-chip">이안전 (시설관리과)<button type="button" class="remove" aria-label="제거">×</button></span>
                                <span class="form-user-chip">정담당 (안전건설과)<button type="button" class="remove" aria-label="제거">×</button></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ── 비고 ── -->
                <div class="form-section">
                    <h2 class="form-section-title">비고</h2>
                    <div class="form-field">
                        <label class="form-field-label" for="f-note">비고 메모</label>
                        <textarea class="form-textarea" id="f-note" name="note" maxlength="2000" placeholder="평가 진행 시 참고할 사항을 자유롭게 작성 (최대 2,000자)"></textarea>
                        <span class="form-field-help">최대 2,000자</span>
                    </div>
                </div>
            </section>

            <!-- ─── 푸터 ─── -->
            <div class="form-footer">
                <button class="btn btn-secondary" type="button" onclick="if(confirm('변경사항이 저장되지 않습니다. 이동하시겠습니까?')) window.location.href='risk-list.html'">취소</button>
                <button class="btn btn-primary" type="button" onclick="window.location.href='risk-detail.html?id=new'">저장</button>
            </div>
        </form>
    </main>

    <!-- 토스트 -->
    <div id="toast" class="toast" role="status"></div>

    <script src="./js/layout.js"></script>
    <script>
        // ─── 평가 등록·수정 폼 인터랙션 ───
        window.RskForm = (function () {
            'use strict';

            // 라디오 카드 active 클래스 동기화
            function syncRadioGroup() {
                document.querySelectorAll('.form-radio').forEach(label => {
                    const input = label.querySelector('input[type=radio]');
                    if (!input) return;
                    label.classList.toggle('is-checked', input.checked);
                    input.addEventListener('change', () => {
                        // 같은 name 그룹의 모든 라벨 갱신
                        document.querySelectorAll(`input[name="${input.name}"]`).forEach(sibling => {
                            sibling.closest('.form-radio').classList.toggle('is-checked', sibling.checked);
                        });
                    });
                });
            }

            // 평가유형 변경 시 트리거 블록 토글
            function onTypeChange(input) {
                const trigger = document.getElementById('f-trigger-block');
                if (!trigger) return;
                trigger.classList.toggle('is-visible', input.value === 'special');
                // 수시 → 정기/최초로 바뀔 때 입력 초기화
                if (input.value !== 'special') {
                    trigger.querySelectorAll('input,textarea').forEach(el => {
                        if (el.type === 'radio') {
                            el.checked = false;
                            el.closest('.form-radio')?.classList.remove('is-checked');
                        } else {
                            el.value = '';
                        }
                    });
                }
            }

            // 관리대상 변경 시 인라인 미리보기 갱신
            function onTargetChange(select) {
                const preview = document.getElementById('f-target-preview');
                if (!preview) return;
                const opt = select.selectedOptions[0];
                if (!opt || !opt.value) {
                    preview.classList.add('is-hidden');
                    return;
                }
                preview.classList.remove('is-hidden');
                preview.querySelector('[data-slot="dept"]').textContent = opt.dataset.dept || '—';
                const typeInfo = preview.querySelector('[data-slot="type-info"]');
                typeInfo.innerHTML = '';
                if (opt.dataset.type) {
                    const tag = document.createElement('span');
                    tag.className = 'type-tag';
                    tag.textContent = opt.dataset.type;
                    typeInfo.appendChild(tag);
                }
                if (opt.dataset.cdpa) {
                    const tag = document.createElement('span');
                    tag.className = 'type-tag';
                    tag.textContent = opt.dataset.cdpa;
                    typeInfo.appendChild(tag);
                }
                if (opt.dataset.grade) {
                    const tag = document.createElement('span');
                    tag.className = 'type-tag';
                    tag.textContent = opt.dataset.grade;
                    typeInfo.appendChild(tag);
                }
                preview.querySelector('[data-slot="last"]').textContent = opt.dataset.last || '—';
            }

            function init() {
                syncRadioGroup();
                // 초기 상태: 평가유형 기본 = regular, 트리거 블록 숨김
                const checkedType = document.querySelector('input[name=assessment_type]:checked');
                if (checkedType) onTypeChange(checkedType);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            return { onTypeChange, onTargetChange };
        })();
    </script>
</body>
</html>
